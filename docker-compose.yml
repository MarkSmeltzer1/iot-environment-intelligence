services:
  mqtt:
    build:
      context: ./docker
      dockerfile: mqtt.Dockerfile
    container_name: iot-environment-mqtt
    ports:
      - "1883:1883"

  influxdb:
    image: influxdb:2.7
    container_name: iot-environment-influxdb
    ports:
      - "8086:8086"
    environment:
      DOCKER_INFLUXDB_INIT_MODE: setup
      DOCKER_INFLUXDB_INIT_USERNAME: ${INFLUXDB_USERNAME:-admin}
      DOCKER_INFLUXDB_INIT_PASSWORD: ${INFLUXDB_PASSWORD:-local-password-123}
      DOCKER_INFLUXDB_INIT_ORG: ${INFLUXDB_ORG:-iot-project}
      DOCKER_INFLUXDB_INIT_BUCKET: ${INFLUXDB_BUCKET:-environment_data}
      DOCKER_INFLUXDB_INIT_ADMIN_TOKEN: ${INFLUXDB_TOKEN:-local-dev-token}
    volumes:
      - influxdb2-data:/var/lib/influxdb2
      - influxdb2-config:/etc/influxdb2

  consumer:
    build: .
    container_name: iot-environment-consumer
    depends_on:
      - mqtt
      - influxdb
    environment:
      MQTT_BROKER: mqtt
      MQTT_PORT: 1883
      INFLUXDB_URL: http://influxdb:8086
      INFLUXDB_ORG: ${INFLUXDB_ORG:-iot-project}
      INFLUXDB_BUCKET: ${INFLUXDB_BUCKET:-environment_data}
      INFLUXDB_TOKEN: ${INFLUXDB_TOKEN:-local-dev-token}
    volumes:
      - ./logs:/app/logs
    command: python scripts/run_consumer.py

  app:
    build: .
    container_name: iot-environment-app
    depends_on:
      - influxdb
    environment:
      INFLUXDB_URL: http://influxdb:8086
      INFLUXDB_ORG: ${INFLUXDB_ORG:-iot-project}
      INFLUXDB_BUCKET: ${INFLUXDB_BUCKET:-environment_data}
      INFLUXDB_TOKEN: ${INFLUXDB_TOKEN:-local-dev-token}
    ports:
      - "8501:8501"
    volumes:
      - ./logs:/app/logs
    command: streamlit run src/dashboard/app.py --server.address 0.0.0.0 --server.port 8501

volumes:
  influxdb2-data:
  influxdb2-config:
